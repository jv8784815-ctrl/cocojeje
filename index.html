<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARA COQUITO ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #1a1f2e 0%, #141824 100%);
      font-family: 'Caveat', cursive;
      padding: 1.5rem;
    }

    .card {
      max-width: 600px;
      width: 100%;
      background: radial-gradient(circle at 20% 30%, #f9e9d2 0%, #f5d8b8 40%, #eac8a2 100%);
      background-image: 
        repeating-linear-gradient(45deg, rgba(210, 160, 110, 0.08) 0px, rgba(210, 160, 110, 0.08) 2px, transparent 2px, transparent 8px),
        radial-gradient(circle at 20% 30%, #f9e9d2 0%, #f5d8b8 40%, #eac8a2 100%);
      border-radius: 48px 48px 36px 36px;
      box-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.5), 0 0 0 2px #dbb88c inset, 0 0 0 6px #f3e5d2 inset;
      padding: 2rem 2rem 2.5rem 2rem;
      border: 1px solid #c9a87c;
    }

    /* título "Te amo" */
    .love-title {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px dashed #b48b5a;
    }

    .love-title h1 {
      font-size: 4rem;
      font-weight: 700;
      color: #3d2a1b;
      text-shadow: 3px 3px 0 #e7cba5;
      letter-spacing: 2px;
    }

    .love-title h1 i {
      color: #c24b4b;
      font-size: 3.2rem;
      margin-left: 10px;
    }

    /* grid de álbumes */
    .albums-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      margin-top: 1rem;
    }

    .album-item {
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .album-item:hover {
      transform: scale(1.03);
    }

    .album-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 12px rgba(60, 40, 20, 0.3), 0 0 0 3px #f5e6d3, 0 0 0 4px #c9a87c;
      transition: box-shadow 0.2s;
    }

    .album-item.playing .album-cover {
      box-shadow: 0 6px 12px rgba(160, 60, 30, 0.4), 0 0 0 3px #ffe0c0, 0 0 0 5px #b56532;
    }

    .album-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #c4a07e;
    }

    .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(30, 20, 10, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .album-item:hover .play-overlay {
      opacity: 1;
    }

    .album-item.playing .play-overlay {
      opacity: 1;
      background: rgba(140, 70, 40, 0.25);
    }

    .play-overlay i {
      font-size: 2.5rem;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .album-info {
      margin-top: 8px;
    }

    .album-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #3d2819;
      line-height: 1.2;
    }

    .album-artist {
      font-size: 1.2rem;
      font-style: italic;
      color: #6f4e31;
      font-weight: 400;
    }

    /* footer */
    .footer-note {
      margin-top: 2rem;
      text-align: center;
      font-size: 1.5rem;
      color: #6b4a2c;
      border-top: 1px dashed #c1a07e;
      padding-top: 1rem;
    }

    audio {
      display: none;
    }

    @media (max-width: 500px) {
      .card { padding: 1.5rem 1rem; }
      .love-title h1 { font-size: 3rem; }
      .albums-grid { gap: 0.8rem; }
      .album-title { font-size: 1.2rem; }
      .album-artist { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- título "Te amo ❤️" -->
    <div class="love-title">
      <h1>Te amo <i class="fas fa-heart"></i></h1>
    </div>

    <!-- grid de álbumes (6 canciones) -->
    <div class="albums-grid">
      <!-- pami - Underaiki -->
      <div class="album-item" data-song="pami.mp3" data-album="pami.jpg">
        <div class="album-cover">
          <img src="albumes/pami.jpg" alt="pami" class="album-img">
          <div class="play-overlay">
            <i class="fas fa-play"></i>
          </div>
        </div>
        <div class="album-info">
          <div class="album-title">pami</div>
          <div class="album-artist">Underaiki</div>
        </div>
      </div>

      <!-- fotolove! - saramalacara -->
      <div class="album-item" data-song="fotolove!.mp3" data-album="fotolove!.jpg">
        <div class="album-cover">
          <img src="albumes/fotolove!.jpg" alt="fotolove!" class="album-img">
          <div class="play-overlay">
            <i class="fas fa-play"></i>
          </div>
        </div>
        <div class="album-info">
          <div class="album-title">fotolove!</div>
          <div class="album-artist">saramalacara</div>
        </div>
      </div>

      <!-- Nara - Underaiki -->
      <div class="album-item" data-song="Nara.mp3" data-album="Nara.jpg">
        <div class="album-cover">
          <img src="albumes/Nara.jpg" alt="Nara" class="album-img">
          <div class="play-overlay">
            <i class="fas fa-play"></i>
          </div>
        </div>
        <div class="album-info">
          <div class="album-title">Nara</div>
          <div class="album-artist">Underaiki</div>
        </div>
      </div>

      <!-- solo x vos - Trueno -->
      <div class="album-item" data-song="solo x vos.mp3" data-album="solo x vos.jpg">
        <div class="album-cover">
          <img src="albumes/solo x vos.jpg" alt="solo x vos" class="album-img">
          <div class="play-overlay">
            <i class="fas fa-play"></i>
          </div>
        </div>
        <div class="album-info">
          <div class="album-title">solo x vos</div>
          <div class="album-artist">Trueno</div>
        </div>
      </div>

      <!-- Amor de siempre - cuco -->
      <div class="album-item" data-song="Amor de siempre.mp3" data-album="Amor de siempre.jpg">
        <div class="album-cover">
          <img src="albumes/Amor de siempre.jpg" alt="Amor de siempre" class="album-img">
          <div class="play-overlay">
            <i class="fas fa-play"></i>
          </div>
        </div>
        <div class="album-info">
          <div class="album-title">Amor de siempre</div>
          <div class="album-artist">cuco</div>
        </div>
      </div>

      <!-- El lago del alma - Roju -->
      <div class="album-item" data-song="El lago del alma.mp3" data-album="El lago del alma.jpg">
        <div class="album-cover">
          <img src="albumes/El lago del alma.jpg" alt="El lago del alma" class="album-img">
          <div class="play-overlay">
            <i class="fas fa-play"></i>
          </div>
        </div>
        <div class="album-info">
          <div class="album-title">El lago del alma</div>
          <div class="album-artist">Roju</div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      <i class="fas fa-music"></i> para coquito <i class="fas fa-heart" style="color: #c24b4b;"></i>
    </div>
  </div>

  <audio id="audioPlayer" preload="auto"></audio>

  <script>
    (function() {
      const audioPlayer = document.getElementById('audioPlayer');
      const albumItems = document.querySelectorAll('.album-item');
      const MUSIC_FOLDER = 'musicas/';
      const ALBUM_FOLDER = 'albumes/';
      
      let currentPlayingItem = null;
      let currentSongFile = null;

      // Manejar error de imágenes de álbum
      document.querySelectorAll('.album-img').forEach(img => {
        img.addEventListener('error', function() {
          const albumName = this.closest('.album-item').dataset.album || 'desconocido';
          this.style.backgroundColor = '#b8956e';
          this.style.padding = '15px';
          this.style.objectFit = 'contain';
          console.warn(`⚠️ Imagen de álbum no encontrada: ${ALBUM_FOLDER}${albumName}`);
        });
      });

      function getSongPath(songFile) {
        return MUSIC_FOLDER + songFile;
      }

      function removePlayingClass() {
        albumItems.forEach(item => {
          item.classList.remove('playing');
          const icon = item.querySelector('.play-overlay i');
          if (icon) icon.className = 'fas fa-play';
        });
      }

      function updateIcon(item, isPlaying) {
        const icon = item.querySelector('.play-overlay i');
        if (icon) {
          icon.className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
        }
      }

      function playSong(item, songFile) {
        if (currentSongFile === songFile && !audioPlayer.paused) {
          audioPlayer.pause();
          removePlayingClass();
          currentSongFile = null;
          currentPlayingItem = null;
          return;
        }

        removePlayingClass();
        audioPlayer.src = getSongPath(songFile);
        item.classList.add('playing');
        
        const playPromise = audioPlayer.play();
        
        if (playPromise !== undefined) {
          playPromise.then(() => {
            currentPlayingItem = item;
            currentSongFile = songFile;
            updateIcon(item, true);
          }).catch(err => {
            console.warn(`Error al reproducir: ${songFile}`, err);
            item.classList.remove('playing');
            
            const icon = item.querySelector('.play-overlay i');
            if (icon) {
              icon.className = 'fas fa-exclamation-triangle';
              setTimeout(() => {
                if (!item.classList.contains('playing')) {
                  icon.className = 'fas fa-play';
                }
              }, 800);
            }
            
            currentPlayingItem = null;
            currentSongFile = null;
          });
        }

        audioPlayer.onended = () => {
          removePlayingClass();
          currentPlayingItem = null;
          currentSongFile = null;
        };
      }

      albumItems.forEach(item => {
        const songFile = item.dataset.song;
        if (!songFile) return;
        item.addEventListener('click', (e) => {
          playSong(item, songFile);
        });
      });

      audioPlayer.addEventListener('pause', () => {
        if (currentPlayingItem) {
          updateIcon(currentPlayingItem, false);
        }
      });

      audioPlayer.addEventListener('play', () => {
        if (currentPlayingItem) {
          updateIcon(currentPlayingItem, true);
        }
      });

      audioPlayer.addEventListener('error', () => {
        if (currentPlayingItem) {
          currentPlayingItem.classList.remove('playing');
          const icon = currentPlayingItem.querySelector('.play-overlay i');
          if (icon) icon.className = 'fas fa-exclamation-circle';
          
          setTimeout(() => {
            if (!currentPlayingItem.classList.contains('playing')) {
              icon.className = 'fas fa-play';
            }
          }, 1000);
        }
        currentSongFile = null;
        currentPlayingItem = null;
      });
    })();
  </script>
</body>
</html>
